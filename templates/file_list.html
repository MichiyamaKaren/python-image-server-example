<!DOCTYPE html>
<html>

<head>
    <title>Files in {{ path }}</title>
    <style type="text/css">
        body {
            margin: 0;
            padding: 10px;
            font-family: sans-serif;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .toolbar button {
            padding: 6px 14px;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid #999;
            font-size: 14px;
        }

        #btn-select-mode {
            background: #f0f0f0;
        }

        #btn-select-mode.active {
            background: #333;
            color: #fff;
            border-color: #333;
        }

        #action-bar {
            display: none;
            align-items: center;
            gap: 8px;
        }

        #action-bar.visible {
            display: flex;
        }

        #btn-select-all {
            background: #f0f0f0;
        }

        #btn-download {
            background: #2196F3;
            color: #fff;
            border-color: #1976D2;
        }

        #btn-delete {
            background: #f44336;
            color: #fff;
            border-color: #d32f2f;
        }

        #selected-count {
            font-size: 14px;
            color: #555;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 200px);
            grid-gap: 10px;
        }

        .image-grid img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            cursor: pointer;
            display: block;
        }

        .image-grid figure {
            position: relative;
            margin: 0;
            width: 200px;
        }

        /* selection mode */
        .select-mode figure {
            cursor: pointer;
        }

        .select-mode figure img {
            cursor: pointer;
        }

        figure.selected img {
            outline: 4px solid #2196F3;
            opacity: 0.85;
        }

        .check-mark {
            display: none;
            position: absolute;
            top: 6px;
            left: 6px;
            width: 24px;
            height: 24px;
            background: #2196F3;
            border-radius: 50%;
            color: #fff;
            font-size: 15px;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
        }

        figure.selected .check-mark {
            display: flex;
        }

        #image-overlay {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        #image-overlay.active {
            display: flex;
        }
        #overlay-img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            cursor: default;
        }
        #overlay-actions {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
            z-index: 101;
        }
        #overlay-actions button {
            padding: 6px 14px;
            border-radius: 4px;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }
        #overlay-btn-download {
            background: #2196F3;
            color: #fff;
        }
        #overlay-btn-delete {
            background: #f44336;
            color: #fff;
        }

        .info-button {
            color: #fff;
            position: absolute;
            right: 10px;
            bottom: 10px;
            border: 2px solid #fff;
            border-radius: 50%;
            background-color: transparent;
            font-size: 16px;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
        }

        .close-button {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            let selectMode = false;
            let lastClickedIndex = -1;
            const selected = new Set();

            const grid = document.querySelector('.image-grid');
            const btnSelectMode = document.getElementById('btn-select-mode');
            const btnSelectAll = document.getElementById('btn-select-all');
            const btnDownload = document.getElementById('btn-download');
            const btnDelete = document.getElementById('btn-delete');
            const actionBar = document.getElementById('action-bar');
            const selectedCount = document.getElementById('selected-count');

            function updateActionBar() {
                selectedCount.textContent = selected.size + ' 项已选';
                actionBar.classList.toggle('visible', selected.size > 0);
            }

            function toggleSelectMode(on) {
                selectMode = on;
                btnSelectMode.classList.toggle('active', on);
                grid.classList.toggle('select-mode', on);
                if (!on) {
                    selected.clear();
                    lastClickedIndex = -1;
                    document.querySelectorAll('figure.selected').forEach(f => f.classList.remove('selected'));
                    actionBar.classList.remove('visible');
                }
            }

            btnSelectMode.addEventListener('click', function () {
                toggleSelectMode(!selectMode);
            });

            btnSelectAll.addEventListener('click', function () {
                const figures = document.querySelectorAll('.image-grid figure');
                const allSelected = figures.length === selected.size;
                figures.forEach(fig => {
                    const path = fig.dataset.path;
                    if (allSelected) {
                        fig.classList.remove('selected');
                        selected.delete(path);
                    } else {
                        fig.classList.add('selected');
                        selected.add(path);
                    }
                });
                updateActionBar();
            });

            btnDownload.addEventListener('click', function () {
                selected.forEach(path => {
                    const a = document.createElement('a');
                    a.href = '/files/' + path;
                    a.download = path.split('/').pop();
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                });
            });

            btnDelete.addEventListener('click', async function () {
                if (!confirm('确认删除选中的 ' + selected.size + ' 个文件？')) return;
                const paths = Array.from(selected);
                const failed = [];
                for (const path of paths) {
                    const resp = await fetch('/files/' + path, { method: 'DELETE' });
                    if (resp.ok) {
                        const fig = document.querySelector('figure[data-path="' + path + '"]');
                        if (fig) fig.remove();
                        selected.delete(path);
                    } else {
                        failed.push(path);
                    }
                }
                updateActionBar();
                if (failed.length) alert('以下文件删除失败：\n' + failed.join('\n'));
            });

            // figure click: select mode / ctrl+click / shift+click
            const figures = Array.from(document.querySelectorAll('.image-grid figure'));

            function setFigureSelected(fig, on) {
                const path = fig.dataset.path;
                if (on) { selected.add(path); fig.classList.add('selected'); }
                else    { selected.delete(path); fig.classList.remove('selected'); }
            }

            function isFigureSelected(fig) {
                return fig.classList.contains('selected');
            }

            figures.forEach((fig) => {
                fig.addEventListener('click', function (e) {
                    if (e.target.classList.contains('info-button')) return;

                    const isModified = e.ctrlKey || e.metaKey || e.shiftKey;

                    // plain click outside select mode → open overlay (handled below)
                    if (!selectMode && !isModified) return;

                    e.preventDefault();   // prevent text selection on shift-click
                    e.stopPropagation();

                    const idx = figures.indexOf(fig);

                    // auto-enter select mode on ctrl/meta click
                    if (!selectMode) toggleSelectMode(true);

                    if (e.shiftKey && lastClickedIndex !== -1) {
                        if (isFigureSelected(fig) === !(isFigureSelected(figures[lastClickedIndex]))) {
                            // range select from lastClickedIndex to idx
                            const lo = Math.min(lastClickedIndex, idx);
                            const hi = Math.max(lastClickedIndex, idx);
                            for (let i = lo; i <= hi; i++) {setFigureSelected(figures[i], isFigureSelected(figures[lastClickedIndex])); }
                        }
                        lastClickedIndex = -1;
                    } else {
                        // toggle this figure
                        setFigureSelected(this, !(isFigureSelected(fig)));
                        if (e.shiftKey) {
                            lastClickedIndex = idx;
                        }
                    }

                    updateActionBar();
                });
            });

            // Open overlay when thumbnail clicked (only outside select mode, no modifier keys)
            let currentOverlayIndex = -1;
            const overlay = document.getElementById('image-overlay');
            const overlayImg = document.getElementById('overlay-img');
            const overlayActions = document.getElementById('overlay-actions');

            function overlayCurrentPath() {
                return figures[currentOverlayIndex].dataset.path;
            }

            function openOverlay(idx) {
                currentOverlayIndex = idx;
                overlayImg.src = figures[idx].querySelector('img').src;
                overlay.classList.add('active');
                overlayActions.style.display = 'flex';
            }

            function closeOverlay() {
                overlay.classList.remove('active');
                overlayActions.style.display = 'none';
            }

            document.getElementById('overlay-btn-download').addEventListener('click', function (e) {
                e.stopPropagation();
                const path = overlayCurrentPath();
                const a = document.createElement('a');
                a.href = '/files/' + path;
                a.download = path.split(/[/\\]/).pop();
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });

            document.getElementById('overlay-btn-delete').addEventListener('click', async function (e) {
                e.stopPropagation();
                const path = overlayCurrentPath();
                if (!confirm('确认删除该文件？')) return;
                const resp = await fetch('/files/' + path, { method: 'DELETE' });
                if (resp.ok) {
                    const fig = figures.splice(currentOverlayIndex, 1)[0];
                    fig.remove();
                    selected.delete(path);
                    updateActionBar();
                    if (figures.length === 0) { closeOverlay(); return; }
                    openOverlay(currentOverlayIndex % figures.length);
                } else {
                    alert('删除失败');
                }
            });

            figures.forEach((fig) => {
                fig.querySelector('img').addEventListener('click', function (e) {
                    if (selectMode) return;
                    if (e.ctrlKey || e.metaKey || e.shiftKey) return;
                    openOverlay(figures.indexOf(fig));
                });
            });

            // Arrow key navigation in overlay
            document.addEventListener('keydown', function (e) {
                if (!document.getElementById('image-overlay').classList.contains('active')) return;
                if (e.key === 'ArrowRight') {
                    openOverlay((currentOverlayIndex + 1) % figures.length);
                } else if (e.key === 'ArrowLeft') {
                    openOverlay((currentOverlayIndex - 1 + figures.length) % figures.length);
                } else if (e.key === 'Escape') {
                    closeOverlay();
                }
            });

            // Close overlay when clicking outside image
            overlay.addEventListener('click', function (e) {
                if (e.target === this) closeOverlay();
            });

            // Info button & modal
            document.querySelectorAll('.info-button').forEach(button => {
                button.addEventListener('click', function (e) {
                    e.stopPropagation();
                    this.nextElementSibling.style.display = 'block';
                });
            });

            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', function (event) {
                    if (event.target === modal) {
                        modal.style.display = 'none';
                    }
                });
            });

            document.querySelectorAll('.close-button').forEach(button => {
                button.addEventListener('click', function () {
                    this.closest('.modal').style.display = 'none';
                });
            });
        });
    </script>
</head>

<body>
    <h1>Files in {{ path }}</h1>

    <div class="toolbar">
        <button id="btn-select-mode">选择</button>
        <div id="action-bar">
            <button id="btn-select-all">全选 / 取消全选</button>
            <button id="btn-download">下载</button>
            <button id="btn-delete">删除</button>
            <span id="selected-count"></span>
        </div>
    </div>

    <div class="image-grid">
        {% for file in files %}
        <figure data-path="{{ file.filename }}">
            <span class="check-mark">&#10003;</span>
            <img src="/files/{{ file.filename }}" alt="{{ file.filename }}">
            <button class="info-button">i</button>
            <div class="modal">
                <div class="modal-content">
                    <span class="close-button">&times;</span>
                    <p>{{ file.metadata }}</p>
                </div>
            </div>
        </figure>
        {% endfor %}
    </div>

    <div id="image-overlay">
        <img id="overlay-img" src="" alt="">
    </div>
    <div id="overlay-actions">
        <button id="overlay-btn-download">下载</button>
        <button id="overlay-btn-delete">删除</button>
    </div>

    <h2>Directories</h2>
    <ul>
        {% for dir in dirs %}
        <li><a href="/files/{{ dir }}">{{ dir }}</a></li>
        {% endfor %}
    </ul>
</body>

</html>
