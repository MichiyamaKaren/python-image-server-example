<!DOCTYPE html>
<html>

<head>
    <title>Files in {{ path }}</title>
    <style type="text/css">
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 200px);
            grid-gap: 10px;
        }

        .image-grid img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            cursor: pointer;
            display: block;
        }

        .image-grid figure {
            position: relative;
            margin: 0;
            width: 200px;
        }

        #image-overlay {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        #image-overlay.active {
            display: flex;
        }
        #overlay-img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            cursor: default;
        }

        .info-button {
            color: #fff;
            position: absolute;
            right: 10px;
            bottom: 10px;
            /* ボーダー設定 */
            border: 2px solid #fff;
            /* 円形にする */
            border-radius: 50%;
            /* 背景透明 */
            background-color: transparent;
            /* フォントサイズ */
            font-size: 16px;
            /* 幅 */
            width: 30px;
            /* 高さ */
            height: 30px;
            /* カーソルをポインタに */
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            /* 半透明背景 */
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
        }

        .close-button {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.info-button').forEach(button => {
                button.addEventListener('click', function () {
                    this.nextElementSibling.style.display = 'block';
                });
            });

            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', function (event) {
                    if (event.target === modal) {
                        modal.style.display = 'none';
                    }
                });
            });

            document.querySelectorAll('.close-button').forEach(button => {
                button.addEventListener('click', function () {
                    this.closest('.modal').style.display = 'none';
                });
            });

            document.querySelectorAll('.image-grid img').forEach(img => {
                img.addEventListener('click', function () {
                    document.getElementById('overlay-img').src = this.src;
                    document.getElementById('image-overlay').classList.add('active');
                });
            });

            document.getElementById('image-overlay').addEventListener('click', function (e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });

        });
    </script>
</head>

<body>
    <h1>Files in {{ path }}</h1>
    <div class="image-grid">
        {% for file in files %}
        <figure>
            <img src="/files/{{ file.filename }}" alt="{{ file.filename }}">
            <button class="info-button">i</button> <!-- 情報ボタン -->
            <div class="modal">
                <div class="modal-content">
                    <span class="close-button">&times;</span>
                    <p>{{ file.metadata }}</p>
                </div>
            </div>
        </figure>
        {% endfor %}
    </div>
    <div id="image-overlay">
        <img id="overlay-img" src="" alt="">
    </div>
    <h2>Directories</h2>
    <ul>
        {% for dir in dirs %}
        <li><a href="/files/{{ dir }}">{{ dir }}</a></li>
        {% endfor %}
    </ul>
</body>

</html>
