<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>

<body>
    <h1></h1>

    <h2><a id="parent-link" href="#">Return to parent dir</a></h2>

    <h2>Directories</h2>
    <ul id="dir-list"></ul>

    <h2>Images</h2>

    <div class="toolbar">
        <button id="btn-select-mode">选择</button>
        <div id="action-bar">
            <button id="btn-select-all">全选 / 取消全选</button>
            <button id="btn-download">下载</button>
            <button id="btn-delete">删除</button>
            <span id="selected-count"></span>
        </div>
        <span id="sse-status"></span>
    </div>
    <div class="image-grid"></div>

    <div id="image-overlay">
        <img id="overlay-img" src="" alt="">
    </div>
    <div id="overlay-actions">
        <button id="overlay-btn-download">下载</button>
        <button id="overlay-btn-delete">删除</button>
    </div>

    <script src="/assets/app.js"></script>
</body>

</html>
